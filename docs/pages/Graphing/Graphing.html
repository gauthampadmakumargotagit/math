<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
       name="viewport"
       content="width=device-width, initial-scale=1.0">
<title>Equation Plotter</title>
<link
       rel="stylesheet"
       href="Graphing.css">
</head>
<body>
<div id="app">
<!-- ==========================================
        Title
   =========================================== -->
<header>
<h1>Equation Plotter</h1>
</header>

<!-- ==========================================
        Equation Editor
   =========================================== -->
<section id="editorPanel">
<label for="equationInput">
Definition of F(x,y)
</label>
<textarea id="equationInput" spellcheck="false">
// Example of a circle
// User constants
var x1 = 2;
var y1 = 2;
var R  = 4;

// Return F(x,y)
return (x-x1)*(x-x1) + (y-y1)*(y-y1) - R*R;

//Other examples
//return circle(x, y);
//return ellipse(x, y);
//return ellipseRotated(x, y);
//return hyperbola(x, y);
//return parabola(x, y);
//return heart(x, y);
//return lemniscate(x, y);
//return cassini(x, y);
//return circlesDuo(x, y);

function circle(x, y)
{
   const r = 5;
   const cx = 2;
   const cy = 6;
   return (x - cx) ** 2 + (y - cy) ** 2 - r ** 2;
}
function ellipse(x, y)
{
   const a = 6;
   const b = 3;
   return (x * x) / (a * a) + (y * y) / (b * b) - 1;
}
function ellipseRotated(x, y)
{
   const a = 6;
   const b = 3;
   const angle = Math.PI / 6;
   const xr = x * Math.cos(angle) + y * Math.sin(angle);
   const yr = -x * Math.sin(angle) + y * Math.cos(angle);
   return (xr * xr) / (a * a) + (yr * yr) / (b * b) - 1;
}
function hyperbola(x, y)
{
   const a = 4;
   const b = 2;
   return (x * x) / (a * a) - (y * y) / (b * b) - 1;
}
function parabola(x, y)
{
   const a = 1;
   return y - a * x * x;
}
function heart(x, y)
{
   return Math.pow(x * x + y * y - 1, 3)
       - x * x * y * y * y;
}
function lemniscate(x, y)
{
   return (x * x + y * y) ** 2 - 2 * (x * x - y * y);
}
function cassini(x, y)
{
   const a = 4;
   return (x * x + y * y) ** 2
       - 2 * a * a * (x * x - y * y)
       - a ** 4;
}
function circlesDuo(x, y)
{
   const r = 3;
   const c1x = -3;
   const c2x = 3;
   const c1 = ((x - c1x) ** 2 + y * y - r * r < 0.15 ? 0:1);
   const c2 = ((x - c2x) ** 2 + y * y - r * r < 0.15 ? 0:1);
   return (c1 * c2);
}
</textarea>
</section>

<!-- ==========================================
        Toolbar
   =========================================== -->
<section id="toolbar">
<button
           id="drawButton"
           type="button">
           Draw
</button>

<div id="toolButtons">
<button
               id="defaultToolButton"
               class="toolButton active"
               type="button"
               title="Default">
               ⌖
</button>

<button
               id="grabToolButton"
               class="toolButton"
               type="button"
               title="Grab">
               ✋
</button>

<button
               id="zoomInToolButton"
               class="toolButton"
               type="button"
               title="Zoom In">
               ＋
</button>

<button
               id="zoomOutToolButton"
               class="toolButton"
               type="button"
               title="Zoom Out">
               －
</button>
</div>
</section>

<!-- ==========================================
        Canvas
   =========================================== -->
<section id="canvasPanel">
<canvas
           id="graphCanvas">
</canvas>
</section>

<!-- ==========================================
        Status Bar
   =========================================== -->
<footer id="statusBar">
<span>
           X :
<span id="statusX">0.000</span>
</span>
<span>
           Y :
<span id="statusY">0.000</span>
</span>
<span>
           Scale :
<span id="statusScale">40</span>
</span>
<span>
           Tool :
<span id="statusTool">Default</span>
</span>
</footer>
</div>

<script src="Graphing.js"></script>
</body>
</html>
