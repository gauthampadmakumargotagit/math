<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quadratic Equations</title>
    <style>
        body {
            font-family: "Georgia", serif;
            padding: 40px;
            background: #ffffff;
            color: #1f2933;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .formula {
            font-size: 22px;
            background: #f1f5f9;
            padding: 20px;
            border-left: 5px solid #6366f1;
            margin: 30px 0;
        }

        p {
            font-size: 18px;
            line-height: 1.7;
        }
    </style>
</head>
<body>

<h1>Quadratic Equations</h1>

<p>
A quadratic equation is of the form:
</p>

<div class="formula">
    ax² + bx + c = 0
</div>

<p>
The solution is obtained using the quadratic formula:
</p>

<div class="formula">
    x = (−b ± √(b² − 4ac)) / 2a
</div>

</body>
</html>
